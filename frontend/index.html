<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050914" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>PyMeet - Modern Video Conferencing</title>
    <style>
      body { margin: 0; padding: 0; background-color: #020617; } /* bg-ink equivalent */
      .instant-loader {
        position: fixed; inset: 0; display: grid; place-items: center; background-color: #020617; z-index: 9999;
      }
      .spinner {
        width: 48px; height: 48px; border-radius: 50%;
        border: 2px solid #67e8f9; /* cyan-300 */
        border-top-color: transparent;
        animation: spin 1.2s linear infinite;
      }
      @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="instant-loader">
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
