<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #1e293b;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            border-bottom: 3px solid #06b6d4; /* Cyan glowing edge */
            -webkit-app-region: drag; /* Makes the bar draggable */
            box-sizing: border-box;
        }
        span {
            font-size: 13px;
            font-weight: 500;
        }
        button {
            -webkit-app-region: no-drag; /* Makes the button clickable */
            background: #ef4444; /* Red-500 */
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #dc2626; /* Red-600 */
        }
    </style>
</head>
<body>
    <span>PyMeet is sharing your screen.</span>
    <button onclick="window.electronAPI.stopSharing()">Stop Sharing</button>
</body>
</html>
