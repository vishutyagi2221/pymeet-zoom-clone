<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: transparent;
            margin: 0;
            padding: 10px;
            overflow: hidden;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background-color: #1e293b;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            border: 1px solid #334155;
            -webkit-app-region: drag;
            box-sizing: border-box;
        }
        span {
            font-size: 14px;
            font-weight: 500;
        }
        button {
            -webkit-app-region: no-drag;
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>
    <div class="container">
        <span>PyMeet is sharing your screen.</span>
        <button onclick="window.electronAPI.stopSharing()">Stop Sharing</button>
    </div>
</body>
</html>
