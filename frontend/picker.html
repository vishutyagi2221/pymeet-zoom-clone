<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #0f172a; /* Tailwind slate-900 */
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            overflow-y: auto;
        }
        h2 {
            margin-top: 0;
            font-size: 18px;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 15px;
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid #334155;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: #94a3b8;
            font-weight: 600;
            font-size: 14px;
        }
        .tab.active {
            color: #06b6d4;
            border-bottom-color: #06b6d4;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .source-item {
            background: #1e293b;
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .source-item:hover {
            border-color: #06b6d4; /* Cyan-500 */
            background: #334155;
        }
        .source-item img {
            max-width: 100%;
            height: 120px;
            object-fit: contain;
            border-radius: 4px;
            margin-bottom: 12px;
            background: #000;
        }
        .source-item span {
            font-size: 13px;
            text-align: center;
            word-wrap: break-word;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #cbd5e1;
        }
        .buttons {
            display: flex;
            justify-content: flex-end;
            margin-top: 30px;
            border-top: 1px solid #334155;
            padding-top: 15px;
        }
        button {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-cancel {
            background: #334155;
            color: #f1f5f9;
        }
        .btn-cancel:hover {
            background: #475569;
        }
    </style>
</head>
<body>
    <h2>Choose what to share</h2>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('screen')">Entire Screen</div>
        <div class="tab" onclick="switchTab('window')">Window</div>
    </div>

    <div id="loading" style="text-align: center; color: #cbd5e1; padding: 40px; font-size: 15px;">Loading screens and windows...</div>
    
    <div class="grid" id="grid-screen"></div>
    <div class="grid" id="grid-window" style="display: none;"></div>

    <div class="buttons">
        <button class="btn-cancel" onclick="window.electronAPI.cancelSelection()">Cancel</button>
    </div>

    <script>
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('grid-screen').style.display = tabName === 'screen' ? 'grid' : 'none';
            document.getElementById('grid-window').style.display = tabName === 'window' ? 'grid' : 'none';
        }

        window.electronAPI.onSourcesReceived((sources) => {
            const gridScreen = document.getElementById('grid-screen');
            const gridWindow = document.getElementById('grid-window');
            const loading = document.getElementById('loading');
            if (loading) loading.style.display = 'none';

            const seenNames = new Set();

            sources.forEach(source => {
                const isScreen = source.id.startsWith('screen:');
                const baseName = source.name.replace(/^\(\d+\)\s*/, '');
                
                if (!isScreen) {
                    if (baseName.includes('PyMeet') || seenNames.has(baseName)) {
                        return;
                    }
                    seenNames.add(baseName);
                }

                const item = document.createElement('div');
                item.className = 'source-item';
                item.onclick = () => window.electronAPI.selectSource(source.id);
                
                const img = document.createElement('img');
                img.src = source.thumbnail;
                
                const label = document.createElement('span');
                label.innerText = isScreen ? source.name : baseName;
                
                item.appendChild(img);
                item.appendChild(label);
                
                if (isScreen) {
                    gridScreen.appendChild(item);
                } else {
                    gridWindow.appendChild(item);
                }
            });
        });
    </script>
</body>
</html>
