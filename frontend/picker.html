<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #0f172a; /* Tailwind slate-900 */
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            overflow-y: auto;
        }
        h2 {
            margin-top: 0;
            font-size: 18px;
            font-weight: 600;
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
            color: #e2e8f0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .source-item {
            background: #1e293b;
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .source-item:hover {
            border-color: #06b6d4; /* Cyan-500 */
            background: #334155;
        }
        .source-item img {
            max-width: 100%;
            height: 120px;
            object-fit: contain;
            border-radius: 4px;
            margin-bottom: 12px;
            background: #000;
        }
        .source-item span {
            font-size: 13px;
            text-align: center;
            word-wrap: break-word;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #cbd5e1;
        }
        .buttons {
            display: flex;
            justify-content: flex-end;
            margin-top: 30px;
            border-top: 1px solid #334155;
            padding-top: 15px;
        }
        button {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-cancel {
            background: #334155;
            color: #f1f5f9;
        }
        .btn-cancel:hover {
            background: #475569;
        }
    </style>
</head>
<body>
    <h2>Choose what to share</h2>
    <div id="loading" style="text-align: center; color: #cbd5e1; padding: 40px; font-size: 15px;">Loading screens and windows...</div>
    <div class="grid" id="grid"></div>
    <div class="buttons">
        <button class="btn-cancel" onclick="window.electronAPI.cancelSelection()">Cancel</button>
    </div>

    <script>
        window.electronAPI.onSourcesReceived((sources) => {
            const grid = document.getElementById('grid');
            const loading = document.getElementById('loading');
            if (loading) loading.style.display = 'none';

            sources.forEach(source => {
                const item = document.createElement('div');
                item.className = 'source-item';
                item.onclick = () => window.electronAPI.selectSource(source.id);
                
                const img = document.createElement('img');
                img.src = source.thumbnail;
                
                const label = document.createElement('span');
                label.innerText = source.name;
                
                item.appendChild(img);
                item.appendChild(label);
                grid.appendChild(item);
            });
        });
    </script>
</body>
</html>
