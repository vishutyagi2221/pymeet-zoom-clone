services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pymeet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pymeet_password}
      POSTGRES_DB: ${POSTGRES_DB:-pymeet}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pymeet}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://pymeet:pymeet_password@postgres:5432/pymeet}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-replace-with-a-long-random-secret}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173,http://127.0.0.1:5173}
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:8000}
        VITE_API_TIMEOUT_MS: ${VITE_API_TIMEOUT_MS:-45000}
        VITE_TURN_URL: ${VITE_TURN_URL:-}
        VITE_TURN_USERNAME: ${VITE_TURN_USERNAME:-}
        VITE_TURN_CREDENTIAL: ${VITE_TURN_CREDENTIAL:-}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:


