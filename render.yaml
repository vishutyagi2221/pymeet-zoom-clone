services:
  - type: web
    name: pymeet-backend
    autoDeploy: false
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_ORIGIN
        value: "https://pymeet-zoom-clone.vercel.app,file://" # Restrict to Vercel and local Desktop app
